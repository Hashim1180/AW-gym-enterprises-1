<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AW GYM ENTERPRISES | THE ZENITH 2026</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@100;300;800&family=Teko:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --blood: #E50914; --bg: #050505; }
        * { cursor: none !important; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        /* CUSTOM CURSOR */
        #cursor { position: fixed; width: 8px; height: 8px; background: var(--blood); border-radius: 50%; pointer-events: none; z-index: 100001; transition: transform 0.1s; }
        #cursor-f { position: fixed; width: 35px; height: 35px; border: 1px solid var(--blood); border-radius: 50%; pointer-events: none; z-index: 100000; transition: transform 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* INTRO ANIMATION */
        #intro { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 1.2s cubic-bezier(1, 0, 0, 1); }
        .glitch { font-family: 'Cinzel', serif; font-size: 4vw; letter-spacing: 2rem; color: white; text-transform: uppercase; }

        /* ATMOSPHERE */
        #main-bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -10; opacity: 0.25; filter: contrast(1.2) brightness(0.5); }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #000 100%); z-index: -5; pointer-events: none; }

        /* PRODUCT CARDS */
        .card-arsenal { background: rgba(10, 10, 10, 0.7); border: 1px solid #1a1a1a; backdrop-filter: blur(10px); transition: all 0.5s ease; position: relative; overflow: hidden; }
        .card-arsenal:hover { border-color: var(--blood); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(229, 9, 20, 0.3); }
        .media-container { height: 380px; position: relative; overflow: hidden; border-bottom: 1px solid #222; }
        .media-container video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.6s ease; }
        .card-arsenal:hover video { opacity: 1; }

        /* BOTS */
        .bot-panel { position: fixed; bottom: -600px; width: 340px; height: 480px; z-index: 2000; transition: bottom 0.8s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid rgba(255, 0, 0, 0.2); background: rgba(0,0,0,0.98); }
        .bot-panel.active { bottom: 20px; }
        .bot-log { height: 350px; overflow-y: auto; padding: 20px; font-size: 11px; font-family: 'Montserrat'; scrollbar-width: none; }
        .bot-log p { margin-bottom: 12px; border-left: 2px solid var(--blood); padding-left: 10px; opacity: 0; transform: translateX(-10px); animation: slideIn 0.5s forwards; }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

        .btn-zenith { border: 1px solid var(--blood); padding: 12px 24px; font-family: 'Teko'; letter-spacing: 3px; text-transform: uppercase; transition: 0.4s; background: transparent; }
        .btn-zenith:hover { background: var(--blood); color: black; box-shadow: 0 0 15px var(--blood); }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-f"></div>

    <audio id="bg-music" loop><source src="music/theme.mp3" type="audio/mpeg"></audio>

    <div id="intro">
        <div class="glitch mb-12">AW GYM</div>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleAuth"></div>
        <div class="g_id_signin mb-6" data-type="standard"></div>
        <button onclick="enterSanctuary()" class="btn-zenith">BREACH THE VAULT</button>
        <div class="mt-8 text-[9px] tracking-[0.8em] text-red-600 animate-pulse">ENCRYPTED CONNECTION ESTABLISHED</div>
    </div>

    <div id="main-app" class="hidden opacity-0 transition-opacity duration-1000">
        <video id="main-bg-video" loop muted playsinline><source src="videos/lv_0_20260213174657.mp4"></video>
        <div class="vignette"></div>

        <nav class="fixed top-0 w-full p-8 flex justify-between items-center z-50 glass">
            <div class="font-luxury text-2xl tracking-tighter">AW <span class="text-red-600">ENTERPRISES</span></div>
            <div class="flex gap-8">
                <button onclick="toggleBot('oracle')" class="text-[10px] tracking-widest uppercase text-gray-400 hover:text-white">The Oracle</button>
                <button onclick="toggleBot('warden')" class="text-[10px] tracking-widest uppercase text-red-600 hover:text-white">The Warden</button>
            </div>
        </nav>

        <main class="relative pt-48 px-8 md:px-20 pb-24">
            <div class="mb-20">
                <h1 class="font-luxury text-7xl md:text-9xl opacity-10 absolute -top-10 left-0">ARSENAL</h1>
                <p class="text-red-600 tracking-[1rem] uppercase text-xs">Market Index 2026</p>
            </div>
            <div id="vault-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12"></div>
        </main>
    </div>

    <div id="bot-warden" class="bot-panel right-5 md:right-10">
        <div class="p-4 bg-red-900/30 font-luxury text-[10px] flex justify-between items-center">
            <span>// TACTICAL WARDEN</span>
            <button onclick="this.parentElement.parentElement.classList.remove('active')">[X]</button>
        </div>
        <div id="warden-log" class="bot-log text-red-500"></div>
    </div>

    <div id="bot-oracle" class="bot-panel left-5 md:left-10">
        <div class="p-4 bg-white/5 font-luxury text-[10px] flex justify-between items-center">
            <span>// LUXURY ORACLE</span>
            <button onclick="this.parentElement.parentElement.classList.remove('active')">[X]</button>
        </div>
        <div id="oracle-log" class="bot-log text-gray-400 italic"></div>
    </div>

    <script>
        // CURSOR
        const c = document.getElementById('cursor'), f = document.getElementById('cursor-f');
        document.addEventListener('mousemove', (e) => {
            c.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            f.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        // 8 PRODUCT VIDEOS (9th is background)
        const inventory = [
            { name: 'Commercial Treadmill', price: 350000, vid: 'videos/No Matter Where You Start - NordicTrack Commercial 2950 Treadmill Powered by iFit(720P_HD).mp4', img: 'images/Revo-rt114-ac.jpg' },
            { name: 'Pure Creatine (300g)', price: 7000, vid: 'videos/Pure Creatine Monohydrate By Wellcore _ The Ultimate Muscle Fuel(720P_HD).mp4', img: 'images/wellcore---pure-micronised-creatine-monohydrate-fruit-fusion-enhanced-.webp' },
            { name: '12.5kg Hex Dumbbells', price: 7500, vid: 'videos/VID_20260213175502.mp4', img: 'images/1-PC-APOLLO-PRO-STYLE-RUBBER-DUMBBELL-2-1.jpg' },
            { name: 'Whey Protein Matrix', price: 11000, vid: 'videos/Whey protein AD _ Vlad rum video(720P_HD).mp4', img: 'https://images.unsplash.com/photo-1593095948071-474c5cc2989d?w=800' },
            { name: 'Heavy Squat Rack', price: 90000, vid: 'videos/RITFIT GAZELLE 3-in-1 Leg Press Hack Squat Machine for Home Gym(720P_HD).mp4', img: 'images/Screenshot_2026-03-12-13-51-19-15_99c04817c0de5652397fc8b56c3b3817.jpg' },
            { name: '20kg Hex Dumbbells', price: 12000, vid: 'videos/Barbell Innovation since 2008 _ Full Commercial  _  8K(720P_HD).mp4', img: 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=800' },
            { name: 'Air Bike Elite', price: 90000, vid: 'videos/RB Gripper ad 2(480P).mp4', img: 'https://images.unsplash.com/photo-1584735935682-2f2b69dff9d2?w=800' },
            { name: 'Pre-Workout Rage', price: 9000, vid: 'videos/Cinematic C4 Pre Workout Commercial(720P_HD).mp4', img: 'https://images.unsplash.com/photo-1550345332-09e3ac987658?w=800' }
        ];

        const scripts = {
            warden: ["PROTOCOL INITIATED.", "This isn't a playground, it's an armory.", "The 350,000 PKR Treadmill is for those who never stop.", "Secure your assets or get out of the way.", "We negotiate only with those serious about iron.", "WhatsApp is the secure line. Use it.", "VICTORY REQUIRES SACRIFICE."],
            oracle: ["Welcome to the sanctuary of excellence.", "We provide the engineering; you provide the will.", "Our 11,000 PKR Whey is the gold standard of recovery.", "Note the industrial precision of our heavy-duty racks.", "Every investment here is an investment in your legacy.", "Shall I prepare a bespoke quote for your facility?", "Your evolution begins with the right equipment."]
        };

        function enterSanctuary() {
            document.getElementById('bg-music').play().catch(()=>{});
            document.getElementById('intro').style.transform = 'translateY(-100%)';
            document.getElementById('main-app').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('main-app').classList.add('opacity-100');
                document.getElementById('main-bg-video').play();
                renderVault();
            }, 600);
        }

        function renderVault() {
            const grid = document.getElementById('vault-grid');
            inventory.forEach(p => {
                const card = document.createElement('div');
                card.className = "card-arsenal p-6";
                card.innerHTML = `
                    <div class="media-container">
                        <img src="${p.img}" class="w-full h-full object-cover grayscale">
                        <video src="${p.vid}" loop muted playsinline></video>
                    </div>
                    <h4 class="font-luxury mt-6 text-xl tracking-widest uppercase">${p.name}</h4>
                    <p class="font-teko text-3xl text-red-600 mb-6">PKR ${p.price.toLocaleString()}</p>
                    <button onclick="negotiate('${p.name}')" class="btn-zenith w-full">NEGOTIATE</button>
                `;
                grid.appendChild(card);
                card.onmouseenter = () => card.querySelector('video').play();
                card.onmouseleave = () => card.querySelector('video').pause();
            });
        }

        function toggleBot(type) {
            document.querySelectorAll('.bot-panel').forEach(p => p.classList.remove('active'));
            const win = document.getElementById('bot-' + type);
            win.classList.add('active');
            const log = document.getElementById(type + '-log');
            log.innerHTML = '';
            scripts[type].forEach((line, i) => {
                setTimeout(() => {
                    const p = document.createElement('p');
                    p.innerText = line;
                    log.appendChild(p);
                    log.scrollTop = log.scrollHeight;
                }, i * 1500);
            });
        }

        function negotiate(item) {
            window.open(`https://wa.me/923497814918?text=AW Manager, I am securing the ${item} from the Vault.`, '_blank');
        }

        function handleAuth(r) { enterSanctuary(); }
    </script>
</body>
</html>
