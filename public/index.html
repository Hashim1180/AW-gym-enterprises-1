<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AW GYM ENTERPRISES | The Iron Sanctuary</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Montserrat:wght@200;300;400;600;800&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blood: { 500: '#E50914', 700: '#8B0000', 900: '#3D0000' },
                        gunmetal: { 800: '#1C1C1C', 900: '#0F0F0F', 950: '#050505' },
                        gold: { 500: '#D4AF37', 700: '#8A7322' }
                    },
                    fontFamily: {
                        luxury: ['"Cinzel"', 'serif'],
                        sans: ['"Montserrat"', 'sans-serif'],
                        ticker: ['"Teko"', 'sans-serif']
                    },
                    backgroundImage: {
                        'carbon-fiber': 'repeating-linear-gradient(45deg, #0a0a0a 0px, #0a0a0a 10px, #0f0f0f 10px, #0f0f0f 20px)',
                        'blood-gradient': 'radial-gradient(circle at center, rgba(139,0,0,0.4) 0%, rgba(5,5,5,1) 80%)'
                    }
                }
            }
        }
    </script>

    <style>
        :root { cursor: crosshair; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #3D0000; }
        ::-webkit-scrollbar-thumb:hover { background: #E50914; }
        body { background-color: #050505; color: #FFFFFF; overflow-x: hidden; user-select: none; }

        #audio-visualizer {
            position: fixed; bottom: 30px; left: 30px; z-index: 9999;
            display: flex; gap: 3px; align-items: flex-end; height: 20px;
            opacity: 0; transition: opacity 1s ease;
        }
        .bar { width: 4px; background: #E50914; border-radius: 1px; animation: equalize 1s infinite alternate ease-in-out; box-shadow: 0 0 10px #E50914; }
        @keyframes equalize { 0% { height: 5px; } 100% { height: 25px; } }

        #the-gate { position: fixed; inset: 0; background: #050505; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .cyber-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(229, 9, 20, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(229, 9, 20, 0.1) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px); animation: gridMove 10s linear infinite; z-index: -1; opacity: 0.3; }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } to { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); } }

        #ambient-video-layer { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; opacity: 0.3; filter: contrast(1.5) saturate(0) brightness(0.6); mix-blend-mode: luminosity; }
        .red-overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #050505 90%); box-shadow: inset 0 0 150px rgba(229, 9, 20, 0.15); z-index: -1; pointer-events: none; }

        .glass-panel { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(229, 9, 20, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .product-tile { position: relative; overflow: hidden; border-radius: 4px; background: #0f0f0f; border: 1px solid #1c1c1c; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .product-tile:hover { border-color: #E50914; transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px -10px rgba(229, 9, 20, 0.4); z-index: 10; }
        .product-media { position: relative; height: 350px; width: 100%; overflow: hidden; background: #000; }
        .product-media img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s ease, transform 1s ease; opacity: 1; }
        .product-media video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease; transform: scale(1.05); }
        .product-tile:hover .product-media img { opacity: 0; }
        .product-tile:hover .product-media video { opacity: 1; }

        .glitch-text { position: relative; display: inline-block; }
        .glitch-text::before, .glitch-text::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8; }
        .glitch-text::before { left: 2px; text-shadow: -2px 0 red; clip: rect(24px, 550px, 90px, 0); animation: glitch-anim 3s infinite linear alternate-reverse; }
        .glitch-text::after { left: -2px; text-shadow: -2px 0 blue; clip: rect(85px, 550px, 140px, 0); animation: glitch-anim 2.5s infinite linear alternate-reverse; }
        @keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 44px, 0); } 100% { clip: rect(85px, 9999px, 140px, 0); } }

        .btn-aggressive { display: inline-flex; align-items: center; justify-content: center; padding: 1rem 2.5rem; position: relative; overflow: hidden; background: transparent; border: 1px solid #E50914; color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; transition: all 0.3s ease; font-size: 0.8rem; z-index: 1; }
        .btn-aggressive::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: #E50914; transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1); z-index: -1; }
        .btn-aggressive:hover { color: #000; }
        .btn-aggressive:hover::before { left: 0; }

        .price-ticker { font-family: 'Teko', sans-serif; font-size: 2.5rem; line-height: 1; letter-spacing: 1px; }
    </style>
</head>
<body>

    <audio id="bgm-audio" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_79808a3d54.mp3" type="audio/mpeg">
    </audio>

    <div id="audio-visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div id="the-gate">
        <div class="cyber-grid"></div>
        <div class="relative z-10 flex flex-col items-center text-center p-8 glass-panel max-w-xl mx-4">
            <h1 class="font-luxury text-4xl text-white mb-6 glitch-text" data-text="AW GYM">AW GYM</h1>
            <button id="btn-breach" class="btn-aggressive w-full">BREACH THE SANCTUARY</button>
            <div id="scan-progress" class="w-full h-1 bg-gunmetal-900 mt-8 overflow-hidden hidden">
                <div class="h-full bg-blood-500 w-0" id="scan-bar"></div>
            </div>
        </div>
    </div>

    <video id="ambient-video-layer" loop muted playsinline>
        <source src="videos/lv_0_20260213174657.mp4" type="video/mp4">
    </video>
    <div class="red-overlay"></div>

    <div id="main-app" class="hidden opacity-0">
        <header class="fixed top-0 w-full z-50 glass-panel">
            <div class="flex justify-between items-center px-6 py-5">
                <div class="font-luxury text-2xl text-white tracking-widest">AW GYM ENTERPRISES</div>
            </div>
        </header>

        <section id="the-vault" class="py-32 px-4 md:px-12 lg:px-20 relative">
            <h2 class="font-luxury text-4xl text-white mb-16 text-center">THE ARSENAL</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-8"></div>
        </section>
    </div>

    <script>
        const WA_NUMBER = "923497814918";
        const bgm = document.getElementById('bgm-audio');

        // --- UPDATED PRODUCTS (Removed public/) ---
        const products = [
            { id: 'AW1', name: 'Commercial Treadmill', cat: 'Cardio', price: 350000, img: 'images/Revo-rt114-ac.jpg', vid: 'videos/No Matter Where You Start - NordicTrack Commercial 2950 Treadmill Powered by iFit(720P_HD).mp4' },
            { id: 'AW2', name: 'Creatine Monohydrate (300g)', cat: 'Supplement', price: 7000, img: 'images/wellcore---pure-micronised-creatine-monohydrate-fruit-fusion-enhanced-.webp', vid: 'videos/Pure Creatine Monohydrate By Wellcore _ The Ultimate Muscle Fuel(720P_HD).mp4' },
            { id: 'AW3', name: 'Rubber Hex Dumbbells (12.5kg)', cat: 'Dumbbells', price: 7500, img: 'images/1-PC-APOLLO-PRO-STYLE-RUBBER-DUMBBELL-2-1.jpg', vid: 'videos/VID_20260213175502.mp4' },
            { id: 'AW4', name: 'Whey Protein (1kg)', cat: 'Supplement', price: 11000, img: 'https://images.unsplash.com/photo-1593095948071-474c5cc2989d?w=800&q=80', vid: 'videos/Whey protein AD _ Vlad rum video(720P_HD).mp4' },
            { id: 'AW5', name: 'Squat Rack (Heavy Duty)', cat: 'Strength', price: 90000, img: 'images/Screenshot_2026-03-12-13-51-19-15_99c04817c0de5652397fc8b56c3b3817.jpg', vid: 'videos/RITFIT GAZELLE 3-in-1 Leg Press Hack Squat Machine for Home Gym(720P_HD).mp4' },
            { id: 'AW6', name: 'Rubber Hex Dumbbells (20kg)', cat: 'Dumbbells', price: 12000, img: 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=800&q=80', vid: 'videos/Barbell Innovation since 2008 _ Full Commercial  _  8K(720P_HD).mp4' }
        ];

        document.getElementById('btn-breach').addEventListener('click', () => {
            document.getElementById('scan-progress').classList.remove('hidden');
            gsap.to("#scan-bar", { width: "100%", duration: 1.5, onComplete: () => {
                bgm.play();
                document.getElementById('ambient-video-layer').play();
                gsap.to("#the-gate", { opacity: 0, display: "none" });
                gsap.to("#main-app", { display: "block", opacity: 1, onComplete: renderVault });
            }});
        });

        function renderVault() {
            const grid = document.getElementById('product-grid');
            products.forEach(prod => {
                const card = document.createElement('div');
                card.className = "product-tile flex flex-col";
                card.innerHTML = `
                    <div class="product-media" onmouseenter="this.querySelector('video').play()" onmouseleave="this.querySelector('video').pause()">
                        <img src="${prod.img}" alt="${prod.name}">
                        <video src="${prod.vid}" loop muted playsinline></video>
                    </div>
                    <div class="p-6">
                        <h4 class="font-luxury text-xl text-white uppercase">${prod.name}</h4>
                        <div class="font-ticker text-3xl text-blood-500 my-4">PKR ${prod.price.toLocaleString()}</div>
                        <button onclick="negotiate('${prod.name}', ${prod.price})" class="w-full btn-aggressive">NEGOTIATE</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function negotiate(name, price) {
            const msg = `AW Manager, I'm interested in ${name} for PKR ${price.toLocaleString()}.`;
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
